<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meinungs-Macher – Heschu Hasan</title>

<style>
:root {
  --magenta: #c77dff;
  --purple: #c77dff;
  --pink: #ff7ac6;
  --blue: #8fd3ff;
  --dark: #0a0a1a;
  --gradient: linear-gradient(135deg, #1a1a40, #000000);
  --white: #ffffff;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: Calibri, sans-serif;
  background: var(--dark);
  color: var(--purple);
  line-height: 1.6;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

  button.back-button {
  display: block;
  margin: 30px auto;
  width: 250px;
  padding: 15px 0;
  font-size: 1.2rem;
  font-weight: 700;
  background: var(--pink);
  color: var(--white);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}

button.back-button:hover {
  background: var(--purple);
}

header {
  background: var(--gradient);
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1 {
  color: var(--pink);
  text-transform:uppercase;
}

nav a {
  margin-left:20px;
  color: var(--pink);
  text-transform:uppercase;
  font-weight:600;
  text-decoration: none; 
}

nav a.active, nav a:hover {
  color: var(--purple);
}

main {
  flex:1;
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

h2 {
  text-align:center;
  color: var(--pink);
}

p.center {
  text-align:center;
  margin-bottom:20px;
}

.question {
  border:2px solid var(--pink);
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
}

.answers label {
  margin-right:15px;
}

button {
  display:block;
  margin:20px auto;
  padding:12px 20px;
  background: var(--pink);
  color:white;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

button:hover {
  background: var(--purple);
}

#feedback {
  text-align:center;
  font-weight:700;
  margin-top:20px;
}

footer {
  background: var(--gradient);
  text-align:center;
  padding:30px 20px;
  color:white;
}

footer h3 {
  margin-bottom:10px;
  color: var(--pink);
}

footer a {
  color: var(--pink);
  font-size:30px;
}
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header>
  <h1>HESCHU HASAN</h1>
  <nav>
    <a href="index.html">Startseite</a>
  </nav>
</header>

<main>
  <h2>Meinungs-Macher</h2>
  <p class="center">
    Finden Sie heraus, inwieweit Ihre Werte mit den Prinzipien des LumiLiberalismus übereinstimmen.
  </p>

  <form id="quizForm">
    <div id="questions"></div>
    <button type="submit">Auswerten</button>
  </form>

  <div id="feedback"></div>
  <button class="back-button" onclick="window.location.href='index.html';">← Zurück</button>
</main>

 <footer>
  <h3>Treffen Sie mich auf Instagram</h3>
  <div class="social-links">
    <a href="https://www.instagram.com/heschuhasan/" target="_blank" rel="noopener" aria-label="Instagram">
      <i class="fab fa-instagram"></i>
    </a>
  </div>
  <p class="social-text">Folgen Sie mir auf Instagram</p>
  <p>© 2026 Heschu Hasan – Alle Rechte vorbehalten</p>
</footer>

<script>
const questions = [
  "Sollten politische Entscheidungen stärker auf Frieden und Diplomatie ausgerichtet sein?",
  "Sollte der Ausbau erneuerbarer Energien und innovativer Technologien beschleunigt werden?",
  "Sollte Digitalisierung als zentrale Grundlage für gesellschaftlichen Fortschritt verstanden werden?",
  "Sollte Bildung stärker auf Zukunftskompetenzen und individuelle Förderung ausgerichtet werden?",
  "Sollte Chancengleichheit unabhängig von Herkunft und Identität gewährleistet sein?",
  "Sollten Innovation und Unternehmertum stärker gefördert werden?",
  "Sollte MINT-Bildung frühzeitig und gezielt gefördert werden?",
  "Sollte Diskriminierung in jeder Form aktiv entgegengewirkt werden?",
  "Sollte der Zugang zu Infrastruktur und digitalen Möglichkeiten für alle verbessert werden?",
  "Sollte internationale Zusammenarbeit zur Sicherung von Frieden und Stabilität gestärkt werden?"
];

const myOpinions = ["Ja","Ja","Ja","Ja","Ja","Ja","Ja","Ja","Ja","Ja"];

const container = document.getElementById("questions");

questions.forEach((q,i)=>{
  const div=document.createElement("div");
  div.className="question";
  div.innerHTML=`
    <p>${i+1}. ${q}</p>
    <div class="answers">
      <label><input type="radio" name="q${i}" value="Ja"> Ja</label>
      <label><input type="radio" name="q${i}" value="Nein"> Nein</label>
    </div>
  `;
  container.appendChild(div);
});

document.getElementById("quizForm").addEventListener("submit", e=>{
  e.preventDefault();
  let score=0;

  for(let i=0;i<questions.length;i++){
    const val=document.querySelector(`input[name="q${i}"]:checked`);
    if(val && val.value===myOpinions[i]) score++;
  }

  const perc=Math.round(score/questions.length*100);
  let message = "";

  if(perc === 100){
    message = `
    🔥 <strong>${perc}% Übereinstimmung!</strong><br><br>
    Ihre Ansichten stimmen vollständig mit den Prinzipien des LumiLiberalismus überein.<br>
    Ich würde mich freuen, wenn Sie diese Ideen weitertragen – Mundpropaganda ist eine der stärksten Formen von Veränderung.
    `;
  }
  else if(perc >= 60){
    message = `
    ✨ <strong>${perc}% Übereinstimmung</strong><br><br>
    In vielen Bereichen bestehen klare Übereinstimmungen.<br>
    Folgen Sie mir gerne auf Instagram, um sich weiter zu informieren.
    `;
  }
  else if(perc >= 30){
    message = `
    🤝 <strong>${perc}% Übereinstimmung</strong><br><br>
    Es gibt einige inhaltliche Überschneidungen.<br>
    Informieren Sie sich gerne weiter über meine Positionen.
    `;
  }
  else{
    message = `
    💭 <strong>${perc}% Übereinstimmung</strong><br><br>
    Ihre Ansichten unterscheiden sich derzeit noch stärker.<br>
    Ein offener Austausch kann dennoch bereichernd sein.
    `;
  }

  document.getElementById("feedback").innerHTML = message;
});
</script>

</body>
</html>
